version: "3.9"

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n-app
    restart: unless-stopped

    ports:
      - "${N8N_PORT:-5689}:5689"

    environment:
      # n8n Configuration
      N8N_PORT: 5689
      N8N_HOST: localhost
      N8N_PROTOCOL: http

      # Public webhook URL (set in .env for production)
      WEBHOOK_URL: ${WEBHOOK_URL}

      # Editor URL
      N8N_EDITOR_BASE_URL: http://localhost:5689

      # Timezone
      GENERIC_TIMEZONE: Asia/Kolkata

    volumes:
      # Persist workflows and credentials
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: